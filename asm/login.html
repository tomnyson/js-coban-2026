<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 400px; margin: 80px auto; }
    </style>
</head>
<body>

<div class="container form-container">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 text-primary">Đăng Nhập</h3>
            <form action="#" method="POST">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Địa chỉ Email</label>
                    <input type="email" class="form-control" id="loginEmail" placeholder="Nhập email của bạn" required>
                </div>
                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Nhập mật khẩu" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Nhớ đăng nhập</label>
                    </div>
                    <a href="#" class="text-decoration-none small">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Đăng nhập</button>
            </form>
            <div class="text-center">
                <span class="small">Chưa có tài khoản? <a href="register.html" class="text-decoration-none">Đăng ký ngay</a></span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
