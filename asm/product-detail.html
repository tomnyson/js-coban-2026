<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .product-img { width: 100%; height: 420px; object-fit: cover; }
        .thumb-img { width: 100%; height: 220px; object-fit: cover; }
    </style>
</head>
<body id="productDetailPage">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">Tech Store</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-3 flex-wrap">
            <a class="nav-link" href="index.html">Trang chủ</a>
            <a class="nav-link" href="products.html">Sản phẩm</a>
            <a class="nav-link active" href="product-detail.html">Chi tiết</a>
            <a class="nav-link" href="cart.html">
                Giỏ hàng <span class="badge text-bg-light ms-1" data-cart-count>0</span>
            </a>
            <a class="nav-link" href="checkout.html">Thanh toán</a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm mb-3">
                <img id="detailImage" src="" alt="" class="product-img">
            </div>
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="mb-3" id="mota">Mô tả sản phẩm</h5>
                    <p class="mb-3" id="detailDescriptionLead"></p>
                    <p class="mb-0" id="detailDescriptionBody"></p>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card shadow-sm h-100">
                <div class="card-body p-4">
                    <span class="badge bg-success mb-3" id="detailStatus">Còn hàng</span>
                    <h2 class="mb-3" id="tenSanPham">Tên sản phẩm</h2>
                    <p class="text-muted">
                        Thông tin sản phẩm được đồng bộ từ kho nội bộ để đảm bảo giá và tồn kho luôn mới nhất.
                    </p>
                    <h4 class="text-danger fw-bold mb-3" id="gia">0 đ</h4>

                    <ul class="list-group mb-4">
                        <li class="list-group-item"><strong>Mã sản phẩm:</strong> <span id="detailCode"></span></li>
                        <li class="list-group-item"><strong>Danh mục:</strong> <span id="detailCategory"></span></li>
                        <li class="list-group-item"><strong>Điểm nổi bật:</strong> <span id="detailSpec"></span></li>
                        <li class="list-group-item"><strong>Tồn kho:</strong> <span id="detailStock"></span></li>
                    </ul>

                    <div class="d-flex gap-2 flex-wrap">
                        <button type="button" class="btn btn-primary" id="buyNowBtn">Mua ngay</button>
                        <button type="button" class="btn btn-outline-primary" id="addToCartBtn">Thêm vào giỏ</button>
                        <a href="products.html" class="btn btn-outline-secondary">Quay lại</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
        <h4 class="mb-0">Sản phẩm liên quan</h4>
        <a href="products.html" class="btn btn-outline-primary btn-sm">Xem tất cả</a>
    </div>

    <div class="row g-4" id="relatedProducts"></div>
</div>

<script src="./scripts/web.js"></script>
</body>
</html>
