<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .product-img-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Admin Panel</a>
            <div class="d-flex text-white align-items-center">
                <span id="show_me" class="me-3">Xin chào, Admin</span>
                <a href="login.html" id="logout" class="btn btn-sm btn-outline-light">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <h3 class="mb-4">Quản lý Sản phẩm</h3>

        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Thêm / Cập nhật Sản phẩm</h5>
                    </div>
                    <div class="card-body">
                        <form id="frmProduct" action="#" method="POST">
                            <div class="mb-3">
                                <label for="productName" class="form-label">mã sản phẩm</label>
                                <input type="text" class="form-control" id="productId" placeholder="nhập mã SP"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="productName" class="form-label">Tên sản phẩm</label>
                                <input type="text" class="form-control" id="productName"
                                    placeholder="VD: Màn hình LG 24 inch" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="productPrice" class="form-label">Giá (VNĐ)</label>
                                    <input type="number" class="form-control" id="productPrice"
                                        placeholder="VD: 3200000" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="productStock" class="form-label">Số lượng tồn</label>
                                    <input type="number" class="form-control" id="productStock" placeholder="VD: 5"
                                        required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="productCategory" class="form-label">Danh mục</label>
                                <select class="form-select" id="productCategory" required>
                                    <option value="" selected disabled>Chọn danh mục...</option>
                                    <option value="Màn hình">Màn hình</option>
                                    <option value="Laptop">Laptop</option>
                                    <option value="Bàn phím">Bàn phím</option>
                                    <option value="Chuột">Chuột</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="productImage" class="form-label">Đường dẫn ảnh (URL/Path)</label>
                                <input type="text" class="form-control" id="productImage"
                                    placeholder="VD: images/lg-24inch.jpg">
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="reset" class="btn btn-secondary">Làm mới</button>
                                <button id="btnSave" type="button" class="btn btn-primary">Lưu sản phẩm</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Danh sách Sản phẩm</h5>
                        <input type="text" class="form-control form-control-sm w-25" placeholder="Tìm kiếm...">
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="text-center">ID</th>
                                        <th scope="col">Hình ảnh</th>
                                        <th scope="col">Tên sản phẩm</th>
                                        <th scope="col">Danh mục</th>
                                        <th scope="col">Giá (VNĐ)</th>
                                        <th scope="col" class="text-center">Tồn kho</th>
                                        <th scope="col" class="text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="list_product">
                                    <tr>
                                        <td class="text-center fw-bold">4</td>
                                        <td>
                                            <img src="https://via.placeholder.com/50" alt="Màn hình LG 24 inch"
                                                class="product-img-thumb">
                                        </td>
                                        <td>Màn hình LG 24 inch</td>
                                        <td><span class="badge bg-info text-dark">Màn hình</span></td>
                                        <td class="text-danger fw-bold">3,200,000 đ</td>
                                        <td class="text-center">5</td>
                                        <td class="text-center">
                                            <button class="btn btn-sm btn-warning me-1" title="Sửa">Sửa</button>
                                            <button class="btn btn-sm btn-danger" title="Xóa">Xóa</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white">
                        <nav aria-label="Page navigation">
                            <ul class="pagination pagination-sm justify-content-end mb-0">
                                <li class="page-item disabled"><a class="page-link" href="#">Trước</a></li>
                                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                                <li class="page-item"><a class="page-link" href="#">2</a></li>
                                <li class="page-item"><a class="page-link" href="#">Sau</a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalForm" aria-hidden="true" aria-labelledby="exampleModalToggleLabel2"
        tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalToggle">Sửa Sản phẩm</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="frmProduct" action="#" method="POST">
                        <div class="mb-3">
                            <label for="productName" class="form-label">mã sản phẩm</label>
                            <input type="text" class="form-control" id="productUpdateId" placeholder="nhập mã SP" required>
                        </div>
                        <div class="mb-3">
                            <label for="productName" class="form-label">Tên sản phẩm</label>
                            <input type="text" class="form-control" id="productUpdatetName"
                                placeholder="VD: Màn hình LG 24 inch" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="productPrice" class="form-label">Giá (VNĐ)</label>
                                <input type="number" class="form-control" id="productUpdatePrice" placeholder="VD: 3200000"
                                    required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="productStock" class="form-label">Số lượng tồn</label>
                                <input type="number" class="form-control" id="productUpdateStock" placeholder="VD: 5"
                                    required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="productCategory" class="form-label">Danh mục</label>
                            <select class="form-select" id="productUpdateCategory" required>
                                <option value="" selected disabled>Chọn danh mục...</option>
                                <option value="Màn hình">Màn hình</option>
                                <option value="Laptop">Laptop</option>
                                <option value="Bàn phím">Bàn phím</option>
                                <option value="Chuột">Chuột</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="productImage" class="form-label">Đường dẫn ảnh (URL/Path)</label>
                            <input type="text" class="form-control" id="productUpdateImage"
                                placeholder="VD: images/lg-24inch.jpg">
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="reset" class="btn btn-secondary">Làm mới</button>
                            <button id="btnUpdate" type="button" class="btn btn-primary">Lưu sản phẩm</button>
                        </div>
                    </form>
                </div>
                
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./admin_script.js"></script>

</body>

</html>
