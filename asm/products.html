<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .product-img { width: 100%; height: 220px; object-fit: cover; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">Tech Store</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-3 flex-wrap">
            <a class="nav-link" href="index.html">Trang chủ</a>
            <a class="nav-link active" href="products.html">Sản phẩm</a>
            <a class="nav-link" href="cart.html">
                Giỏ hàng <span class="badge text-bg-light ms-1" data-cart-count>0</span>
            </a>
            <a class="nav-link" href="checkout.html">Thanh toán</a>
            <a class="nav-link" href="login.html">Đăng nhập</a>
        </div>
    </div>
</nav>

<div class="container mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
        <div>
            <h3 class="mb-1">Danh sách sản phẩm công nghệ</h3>
            <p class="text-muted mb-0">Tất cả sản phẩm được lấy từ kho dữ liệu localStorage và sẵn sàng thêm vào giỏ.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <span class="badge text-bg-light border fs-6 py-2 px-3" id="productCount">0 sản phẩm</span>
            <a href="cart.html" class="btn btn-outline-primary">Xem giỏ hàng</a>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-3 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Danh mục</h5>
                </div>
                <div class="list-group list-group-flush" id="categoryList"></div>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="row g-4" id="productGrid"></div>
        </div>
    </div>
</div>

<script src="./scripts/web.js"></script>
</body>
</html>
