<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 400px; margin: 80px auto; }
    </style>
</head>
<body>

<div class="container form-container">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 text-success">Đăng Ký</h3>
            <form action="#" method="POST">
                <div class="mb-3">
                    <label for="registerName" class="form-label">Họ và tên</label>
                    <input type="text" class="form-control" id="registerName" placeholder="Nhập họ và tên" required>
                </div>
                <div class="mb-3">
                    <label for="registerEmail" class="form-label">Địa chỉ Email</label>
                    <input type="email" class="form-control" id="registerEmail" placeholder="Nhập email của bạn" required>
                </div>
                <div class="mb-3">
                    <label for="registerPassword" class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="registerPassword" placeholder="Tạo mật khẩu" required>
                </div>
                <div class="mb-4">
                    <label for="registerConfirmPassword" class="form-label">Xác nhận mật khẩu</label>
                    <input type="password" class="form-control" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu" required>
                </div>
                <button type="button" id="btnDangKy" class="btn btn-success w-100 mb-3">Tạo tài khoản</button>
            </form>
            <div class="text-center">
                <span class="small">Đã có tài khoản? <a href="login.html" class="text-decoration-none">Đăng nhập tại đây</a></span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./script.js"></script>
</body>
</html>
